command:
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: SQL_WAREHOUSE_ID
    valueFrom: sql-warehouse
  # Filled from bundle variables on deploy (${var.*}); empty for local dev unless env is exported.
  - name: MLFLOW_EXPERIMENT_NAME
    value: ${var.mlflow_experiment_name}
  - name: PROMPT_CATALOG
    value: ${var.prompt_catalog}
  - name: PROMPT_SCHEMA
    value: ${var.prompt_schema}
  - name: EVAL_CATALOG
    value: ${var.eval_catalog}
  - name: EVAL_SCHEMA
    value: ${var.eval_schema}
  - name: EVALUATE_TAB_ENABLED
    value: ${var.evaluate_tab_enabled}
