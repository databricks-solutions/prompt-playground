command:
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # SQL warehouse and MLflow experiment are chosen in App Settings (pp_settings.json), not at deploy time.
  # Bundle variables below seed optional defaults; catalog/schema are typically set via Settings after deploy.
  - name: PROMPT_CATALOG
    value: ${var.prompt_catalog}
  - name: PROMPT_SCHEMA
    value: ${var.prompt_schema}
  - name: EVAL_CATALOG
    value: ${var.eval_catalog}
  - name: EVAL_SCHEMA
    value: ${var.eval_schema}
  - name: EVALUATE_TAB_ENABLED
    value: ${var.evaluate_tab_enabled}
